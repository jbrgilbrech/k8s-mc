apiVersion: v1
kind: Service
metadata:
  # This service exposes the Minecraft TCP port.
  name: minecraft
  namespace: minecraft
spec:
  selector:
    # The selector must match the pod labels from the StatefulSet.
    app: minecraft
  ports:
    - name: minecraft
      # Minecraft Java clients connect to TCP 25565 by default.
      port: 25565
      # Send traffic to the same port in the container.
      targetPort: 25565
      # Fix the external port so the connection details stay stable.
      nodePort: 32565
      protocol: TCP

  # NodePort is the simplest portable choice for a basic cluster setup.
  # Clients connect to a Kubernetes node IP on the nodePort above.
  type: NodePort
